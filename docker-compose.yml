# POSTGRES
services:
  image_init:
    build: .
    image: image_init:latest
    container_name: container_init
    ports:
      - '3000:3000'
    depends_on:
      - postgres
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: akmzakaria
      POSTGRES_PASSWORD: akm123
      POSTGRES_DB: akm_db
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # PGADMIN
  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: akm@gmail.com
      PGADMIN_DEFAULT_PASSWORD: akm123
    ports:
      - '5050:80'
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:
